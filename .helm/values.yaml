global:
  targetCluster: ""

imagePullSecrets:
  - github-werfio

clusters:
  eu:
    placement:
      nodeSelector: {}
      tolerations: []
      affinity: {}
  ru:
    placement:
      nodeSelector: {}
      tolerations: []
      affinity: {}

priorityClassName:
  _default: develop
  production: production-medium
host:
  production: werf.io
  stage: werf.stage.flant.dev
  dev: werf.dev.flant.dev
  _default: werf.test.flant.dev

ruHost:
  production: ru.werf.io

ingressClassName:
  _default: "nginx"
  production: "standalone-geo"

certificateIssuerName:
  _default: letsencrypt
  production: letsencrypt-standalone-geo

ingressSecretName:
  _default: wildcard-dev-flant-dev
  test: wildcard-test-flant-dev
  stage: wildcard-stage-flant-dev

resources:
  requests:
    memory:
      _default: 30M
      production: 300M

backend:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                service: backend
