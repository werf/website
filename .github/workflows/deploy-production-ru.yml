name: Deploy production RU

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WERF_ENV: "production"
  WERF_REPO: "ghcr.io/${{ github.repository_owner }}/werfio-guides"
  WERF_STAGES_STORAGE: "ghcr.io/werf/werfio-guides-stages"
  WERF_SET_ACTIVE_RELEASE: "global.active_release=2"
  WERFIO_GITHUB_TOKEN: "${{ secrets.API_TOKEN }}"

jobs:
  converge-ru:
    name: Deploy RU to new cluster
    runs-on: prod-github-runner-0
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout werf repo
        uses: actions/checkout@v4
        with:
          repository: werf/werf
          path: werf
          fetch-depth: 0

      - name: Inject trdl_channels.yaml
        run: |
          cp werf/trdl_channels.yaml .helm/trdl_channels.yaml

      - name: Install werf
        uses: werf/actions/install@v2

      - name: Authenticate in Seguro
        id: vault
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: werf-web
          method: jwt
          jwtGithubAudience: github-access-aud
          exportToken: true

      - name: Read and normalize RU kubeconfig
        id: ru_kubeconfig
        run: |
          set -euo pipefail

          response="$(curl -fsSL -H "X-Vault-Token: $VAULT_TOKEN" "https://seguro.flant.com/v1/projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG_RU")"
          secret_value="$(printf '%s' "$response" | jq -r '.data.data["kube.config"]')"

          if [[ -z "$secret_value" || "$secret_value" == "null" ]]; then
            echo "RU kubeconfig secret is empty" >&2
            exit 1
          fi

          if printf '%s' "$secret_value" | base64 -d >/tmp/ru-kubeconfig-decoded 2>/dev/null && grep -q '^apiVersion:' /tmp/ru-kubeconfig-decoded; then
            kubeconfig_base64="$secret_value"
          else
            kubeconfig_base64="$(printf '%s' "$secret_value" | base64 | tr -d '\n')"
          fi

          echo "::add-mask::$kubeconfig_base64"
          echo "field=kube.config" >> "$GITHUB_OUTPUT"
          echo "kubeconfig_base64=$kubeconfig_base64" >> "$GITHUB_OUTPUT"

      - name: Deploy RU to new cluster
        run: |
          . $(werf ci-env github --as-file)
          werf converge --set global.targetCluster=ru
        env:
          WERF_NAMESPACE: "werfio-production"
          WERF_RELEASE: "werfio-site-production"
          WERF_LOG_VERBOSE: "on"
          WERF_ENV: "production"
          WERF_KUBE_CONFIG_BASE64: ${{ steps.ru_kubeconfig.outputs.kubeconfig_base64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## RU deploy

          - Event: ${{ github.event_name }}
          - Target cluster mode: ru
          - Seguro role: werf-web
          - Secret path: projects/data/b454e6aa-39f0-45f4-aa7c-a9465ab154cb/KUBE_CONFIG_RU
          - Secret field used: ${{ steps.ru_kubeconfig.outputs.field }}
          - Helm switch: global.targetCluster=ru

          This workflow deploys RU production on push to main or manual run.
          EOF
